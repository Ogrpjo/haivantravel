name: haivantravel-database

services: 
  postgres: 
    image: postgres:16
    container_name: postgres_db
    restart: always
    environment: 
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports: 
      - "${PORT}:5432"
    volumes: 
      - ./postgres-data:/var/lib/postgresql/data
    networks: 
      - haivantravel_network
  
networks: 
  haivantravel_network:
    external: true